"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

palette = 'rose_pine'

[character]
# Note the use of Rose Pine palette colors
success_symbol = "[❯](pine)"
error_symbol = "[❯](love)"
vimcmd_symbol = "[❮](subtle)" # For use with zsh-vi-mode

[cmake]
format = '[$symbol($version )]($style)'
symbol = ' '

[deno]
format = '[$symbol($version )]($style)'
symbol = ' '

[directory]
fish_style_pwd_dir_length = 1
style = 'foam'
repo_root_style = 'foam bold'

[docker_context]
format = '[$symbol$context]($style) '
symbol = '󰡨 '
style = 'pine bold'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
style = 'foam bold'

[golang]
format = '[$symbol($version )]($style)'
symbol = '󰟓 '
style = 'pine bold'

[hostname]
format = '[$ssh_symbol$hostname]($style) '
ssh_symbol = ' '
style = 'bold pine'

[lua]
format = '[$symbol($version )]($style)'
symbol = '󰢱 '
style = 'iris bold'

[nodejs]
format = '[$symbol($version )]($style)'
symbol = '󰎙 '
style = 'pine bold'

[package]
disabled = true

[php]
format = '[$symbol($version )]($style)'
symbol = '󰌟 '
style = 'iris bold'

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = '󰌠 '
style = 'gold bold'

[rust]
format = '[$symbol($version )]($style)'
symbol = '󱘗 '
style = 'rose bold'

[zig]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'gold bold'

