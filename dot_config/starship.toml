"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

palette = 'catppuccin_mocha'

[character]
# Note the use of Catppuccin color 'peach'
success_symbol = "[❯](green)"
error_symbol = "[❯](peach)"
vimcmd_symbol = "[❮](subtext1)" # For use with zsh-vi-mode

[cmake]
format = '[$symbol($version )]($style)'
symbol = ' '

[deno]
format = '[$symbol($version )]($style)'
symbol = ' '

[directory]
fish_style_pwd_dir_length = 1
style = 'sky'
repo_root_style = 'sky bold'

[docker_context]
format = '[$symbol$context]($style) '
symbol = '󰡨 '
style = 'sapphire bold'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
style = 'teal bold'

[golang]
format = '[$symbol($version )]($style)'
symbol = '󰟓 '
style = 'sapphire bold'

[hostname]
format = '[$ssh_symbol$hostname]($style) '
ssh_symbol = ' '
style = 'bold green'

[lua]
format = '[$symbol($version )]($style)'
symbol = '󰢱 '
style = 'lavender bold'

[nodejs]
format = '[$symbol($version )]($style)'
symbol = '󰎙 '
style = 'green bold'

[package]
disabled = true

[php]
format = '[$symbol($version )]($style)'
symbol = '󰌟 '
style = 'lavender bold'

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = '󰌠 '
style = 'yellow bold'

[rust]
format = '[$symbol($version )]($style)'
symbol = '󱘗 '
style = 'peach bold'

[zig]
format = '[$symbol($version )]($style)'
symbol = ' '
style = 'yellow bold'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
