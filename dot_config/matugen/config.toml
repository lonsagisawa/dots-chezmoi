[config]

[config.wallpaper]
set = true
command = "awww img --transition-type center {{ image }}"

[templates.fuzzel]
input_path = '~/.config/matugen/matugen-themes/templates/fuzzel.ini'
output_path = '~/.config/fuzzel/colors.ini'

[templates.ghostty]
input_path = '~/.config/matugen/matugen-themes/templates/ghostty'
output_path = '~/.config/ghostty/themes/Matugen'
post_hook = 'pkill -SIGUSR2 ghostty'

[templates.gtk3]
input_path = '~/.config/matugen/matugen-themes/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'

[templates.gtk4]
input_path = '~/.config/matugen/matugen-themes/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.niri]
input_path = '~/.config/matugen/matugen-themes/templates/niri-colors.kdl'
output_path = '~/.config/niri/colors.kdl'
post_hook = 'niri msg action load-config-file'

[templates.qt6ct]
input_path = '~/.config/matugen/matugen-themes/templates/qtct-colors.conf'
output_path = '~/.config/qt6ct/colors/matugen.conf'

[templates.swaync]
input_path = "~/.config/matugen/matugen-themes/templates/colors.css"
output_path = "~/.config/swaync/colors.css"
post_hook = "swaync-client -rs"

[templates.waybar]
input_path = '~/.config/matugen/matugen-themes/templates/colors.css'
output_path = '~/.config/waybar/colors.css'
post_hook = 'pkill -SIGUSR2 waybar'

[templates.wlogout]
input_path = '~/.config/matugen/matugen-themes/templates/colors.css'
output_path = '~/.config/wlogout/colors.css'
